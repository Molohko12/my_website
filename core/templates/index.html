{% extends 'base.html' %}
{% load bootstrap5 %}

{% block title %}Главная{% endblock %}

{% block content %}
<h1>Добро пожаловать!</h1>
<p>Заполните форму ниже, чтобы подать заявку.</p>

<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">Отправить</button>
</form>
{% endblock %}
